<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SoulFlame Twins Admin</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(124,60,255,.30), transparent 35%),
        linear-gradient(135deg,#05060d,#101327,#07111e);
      color:white;
      font-family:Arial,sans-serif;
      padding:24px;
    }
    .wrap{width:min(1120px,100%);margin:0 auto}
    .card{
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      border-radius:24px;
      padding:22px;
      margin-bottom:16px;
      box-shadow:0 22px 80px rgba(0,0,0,.28);
    }
    input,button{
      border-radius:14px;
      padding:13px 14px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.28);
      color:white;
    }
    button{
      cursor:pointer;
      background:linear-gradient(135deg,#7c3cff,#4c8dff);
      font-weight:900;
      margin:6px 4px 0 0;
    }
    pre{
      background:rgba(0,0,0,.35);
      padding:16px;
      border-radius:16px;
      overflow:auto;
      white-space:pre-wrap;
      min-height:260px;
    }
    a{color:#8bdfff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>SoulFlame Twins Admin</h1>
      <p>Въведи admin PIN от Vercel Environment Variables.</p>
      <input id="pin" placeholder="ECHO_ADMIN_PIN" style="width:min(420px,100%)">
      <br>
      <button onclick="loadData()">Load Data</button>
      <button onclick="loadMetrics()">Metrics</button>
      <button onclick="generateCode()">Generate Unlock Code</button>
      <a href="/" style="margin-left:12px">Back</a>
      <a href="/test" style="margin-left:12px">Test</a>
    </div>

    <div class="card">
      <h2>Output</h2>
      <pre id="out">Ready.</pre>
    </div>
  </div>

  <script>
    const out = document.getElementById("out");

    function show(data){
      out.textContent = typeof data === "string" ? data : JSON.stringify(data,null,2);
    }

    function pin(){
      return document.getElementById("pin").value.trim();
    }

    async function loadData(){
      show("Loading admin data...");
      const res = await fetch("/api/admin/data", {
        headers: { "x-admin-pin": pin() }
      });
      const data = await res.json();
      show(data);
    }

    async function loadMetrics(){
      show("Loading metrics...");
      const res = await fetch("/api/admin/metrics", {
        headers: { "x-admin-pin": pin() }
      });
      const data = await res.json();
      show(data);
    }

    async function generateCode(){
      show("Generating code...");
      const res = await fetch("/api/admin/code", {
        method:"POST",
        headers: {
          "Content-Type":"application/json",
          "x-admin-pin": pin()
        },
        body: JSON.stringify({
          offer:"Full AI Echo",
          note:"Generated from admin panel"
        })
      });
      const data = await res.json();
      show(data);
    }
  </script>
</body>
</html>
